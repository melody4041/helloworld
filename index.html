<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST预设编辑器</title>
<style>
:root {
  --bg-deep: #16213e;
  --bg-main: #1a1a2e;
  --border-color: #0f3460;
  --text-main: #e0e0e0;
  --text-light: #888;
  --accent: #e94560;
  --accent-hover: #ff6e87;
  --green: #4ade80;
  --red: #ff4757; /* 使用更亮眼的红色 */
  --blue: #3498db;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg-main);
  color: var(--text-main);
  display: flex;
  flex-direction: column;
}
#top {
  background: var(--bg-deep); padding: 10px 20px; display: flex; align-items: center;
  gap: 5px 10px; border-bottom: 2px solid var(--border-color); flex-shrink: 0; flex-wrap: wrap;
}
#top h2 { flex: 1; font-size: 14px; color: var(--accent); min-width: 150px; }
.top-btn {
  padding: 7px 14px; border: none; border-radius: 5px; cursor: pointer;
  font-size: 13px; font-weight: bold;
}
#loadLabel { background: var(--border-color); color: var(--text-main); }
#loadLabel:hover { background: #1a4a8a; }
#exportBtn { background: var(--accent); color: #fff; }
#exportBtn:disabled { background: #444; color: var(--text-light); cursor: not-allowed; }
#fileInput, #importInput { display: none; }
#loadedFile { font-size: 12px; color: var(--text-light); }
#body { display: flex; flex: 1; overflow: hidden; position: relative; }
#tabs {
  width: 110px; background: var(--bg-deep); border-right: 1px solid var(--border-color);
  display: flex; flex-direction: column; flex-shrink: 0;
}
.tab {
  padding: 14px 8px; text-align: center; font-size: 12px; cursor: pointer;
  border-bottom: 1px solid var(--border-color); color: var(--text-light); line-height: 1.5;
}
.tab:hover { background: #1a2a4a; color: var(--text-main); }
.tab.on { background: var(--border-color); color: var(--accent); font-weight: bold; border-left: 3px solid var(--accent); }
#listWrap {
  width: 260px; background: var(--bg-main); border-right: 1px solid var(--border-color);
  display: flex; flex-direction: column; flex-shrink: 0;
}
#listTop {
  padding: 8px 10px; border-bottom: 1px solid var(--border-color); flex-shrink: 0;
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
}
#listTop span { font-size: 12px; color: var(--text-light); width: 100%; }
.list-btn {
  background: var(--border-color); color: var(--text-main); border: none; padding: 4px 10px;
  border-radius: 4px; cursor: pointer; font-size: 12px;
}
.list-btn:hover { background: #1a4a8a; }
#batchActions { display: none; gap: 6px; flex-wrap: wrap; }
#listWrap.batch-mode #listTopRegular { display: none; }
#listWrap.batch-mode #batchActions { display: flex; }
#list { flex: 1; overflow-y: auto; padding: 6px; }

/* 列表项及眼睛开关的样式 */
.item {
  padding: 8px 10px; margin-bottom: 4px; border-radius: 5px; cursor: pointer;
  border: 1px solid transparent; display: flex; align-items: center; gap: 8px; background: var(--bg-deep);
}
.item:hover { background: #1a2a4a; }
.item.on { border-color: var(--accent); background: #1a2a4a; }
.item-name { flex: 1; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: 0.2s; }
.item.is-disabled .item-name { opacity: 0.4; text-decoration: line-through; } /* 禁用时的文本表现 */

/* 隐藏/显示 切换按钮 */
.vis-btn {
  position: relative; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
  font-size: 12px; cursor: pointer; border-radius: 4px; user-select: none;
}
.vis-btn:hover { background: rgba(255,255,255,0.1); }
.vis-off { opacity: 0.6; }
/* 红色的斜线 */
.vis-off::after {
  content: ''; position: absolute; width: 18px; height: 2px;
  background-color: var(--red); transform: rotate(-45deg);
  box-shadow: 0 0 2px rgba(0,0,0,0.8); /* 加点阴影让斜线更清晰 */
}

.item-checkbox { display: none; margin-right: 4px; cursor: default; }
#listWrap.batch-mode .item-checkbox { display: inline-block; }
.item.dragging { opacity: 0.5; }
.item.drag-over { border-top: 2px solid var(--accent); }
#editor { flex: 1; overflow-y: auto; padding: 0; background: var(--bg-main); }
#hint { padding: 60px 20px; text-align: center; color: #444; font-size: 14px; }
#editBox { display: none; flex-direction: column; height: 100%; }
#editTop {
  background: var(--bg-deep); border-bottom: 2px solid var(--accent); padding: 10px 16px;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
#backBtn { display: none; background: var(--border-color); color: var(--text-main); border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
#editTitle { flex: 1; font-size: 13px; font-weight: bold; color: var(--accent); }
#delBtn { background: var(--red); color: #fff; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
#fields { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.field-group { display: flex; flex-direction: column; gap: 5px; }
.field-group > label { font-size: 11px; font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
.field-row { display: flex; gap: 12px; }
.field-row .field-group { flex: 1; }
input, select, textarea { width: 100%; background: var(--bg-deep); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 5px; padding: 8px 10px; font-size: 13px; font-family: inherit; }
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
textarea { font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.6; resize: vertical; min-height: 180px; }
textarea.big { min-height: 380px; }
select option { background: var(--bg-deep); }
@media (max-width: 800px) {
  #tabs { width: 85px; }
  .tab { padding: 12px 5px; font-size: 11px; }
  #listWrap { flex: 1; border-right: none; }
  #editor { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; transform: translateX(100%); transition: transform 0.25s ease-out; display: block; }
  body.show-editor #editor { transform: translateX(0); }
  #backBtn { display: inline-block; }
  #fields { padding: 12px; }
  .field-row { flex-direction: column; gap: 14px; }
  #promptFields .field-row .field-group, #regexFields .field-row .field-group { max-width: none !important; }
}
</style>
</head>
<body>

<div id="top">
  <h2>⚙ ST 预设编辑器</h2>
  <span id="loadedFile">未加载文件</span>
  <label id="loadLabel" class="top-btn" for="fileInput">📂 加载 JSON</label>
  <input type="file" id="fileInput" accept=".json">
  <button id="exportBtn" class="top-btn" disabled>💾 导出 JSON</button>
</div>

<div id="body">
  <div id="tabs">
    <div class="tab on" data-tab="prompts">预设模块<br>Prompts</div>
    <div class="tab" data-tab="regex">内置正则<br>Regex</div>
    <div class="tab" data-tab="settings">基础参数<br>Settings</div>
  </div>

  <div id="listWrap">
    <div id="listTop">
      <span id="listLabel">预设模块列表</span>
      <div id="listTopRegular" style="display:flex; gap:6px; flex-wrap:wrap;">
        <button id="addBtn" class="list-btn">＋ 新增</button>
        <button id="batchBtn" class="list-btn">🔄 批量操作</button>
        <label id="importLabel" class="list-btn" for="importInput">📥 导入模块</label>
        <input type="file" id="importInput" accept=".json">
      </div>
      <div id="batchActions">
        <button id="selectAllBtn" class="list-btn">✅ 全选</button>
        <button id="exportSelectedBtn" class="list-btn" style="background:var(--blue)">📂 导出选中</button>
        <button id="doneBatchBtn" class="list-btn" style="background:var(--accent)">↩️ 完成</button>
      </div>
    </div>
    <div id="list"></div>
  </div>

  <div id="editor"></div>
</div>

<script>
var gData = null, gTab = 'prompts', gIdx = -1, gFile = 'preset.json';
var gDraggedIdx = null, gBatchMode = false, gSelectedIndices = new Set();

function el(id) { return document.getElementById(id); }

// 注入编辑器 HTML
document.getElementById('editor').innerHTML = `
<div id="hint">← 请先加载 JSON，然后点击左侧列表中的任意条目进行编辑</div>
<div id="editBox">
  <div id="editTop">
    <button id="backBtn">← 返回</button>
    <span id="editTitle">正在编辑：</span>
    <button id="delBtn">🗑 删除此项</button>
  </div>
  <div id="fields">
    <div id="promptFields" style="display:flex;flex-direction:column;gap:14px;">
      <div class="field-row">
        <div class="field-group"><label>模块名称 (Name)</label><input type="text" id="f-name"></div>
        <div class="field-group" style="max-width:150px;"><label>启用状态</label>
          <select id="f-enabled"><option value="true">✅ 启用</option><option value="false">❌ 禁用</option></select>
        </div>
      </div>
      <div class="field-row">
        <div class="field-group"><label>注入角色 (Role)</label>
          <select id="f-role"><option value="system">System</option><option value="user">User</option><option value="assistant">Assistant</option></select>
        </div>
        <div class="field-group"><label>注入深度 (Depth)</label><input type="number" id="f-depth" min="0"></div>
        <div class="field-group"><label>注入位置 (Position)</label><input type="number" id="f-pos" min="0"></div>
      </div>
      <div class="field-group"><label>📝 文本内容 (Content)</label><textarea id="f-content" class="big"></textarea></div>
    </div>
    <div id="regexFields" style="display:none;flex-direction:column;gap:14px;">
      <div class="field-row">
        <div class="field-group"><label>正则名称 (Script Name)</label><input type="text" id="r-name"></div>
        <div class="field-group" style="max-width:150px;"><label>启用状态</label>
          <select id="r-enabled"><option value="false">✅ 启用</option><option value="true">❌ 禁用</option></select>
        </div>
      </div>
      <div class="field-group"><label>查找正则 (Find Regex)</label><input type="text" id="r-find"></div>
      <div class="field-group"><label>📝 替换内容 (Replace String)</label><textarea id="r-replace" class="big"></textarea></div>
      <div class="field-row">
        <div class="field-group"><label>Placement (逗号分隔)</label><input type="text" id="r-placement"></div>
        <div class="field-group"><label>Min Depth</label><input type="number" id="r-minDepth" placeholder="null"></div>
        <div class="field-group"><label>Max Depth</label><input type="number" id="r-maxDepth" placeholder="null"></div>
      </div>
      <div class="field-row">
        <div class="field-group"><label>Prompt Only</label>
          <select id="r-promptOnly"><option value="false">False</option><option value="true">True</option></select>
        </div>
        <div class="field-group"><label>Markdown Only</label>
          <select id="r-markdownOnly"><option value="false">False</option><option value="true">True</option></select>
        </div>
        <div class="field-group"><label>Run On Edit</label>
          <select id="r-runOnEdit"><option value="true">True</option><option value="false">False</option></select>
        </div>
      </div>
    </div>
    <div id="settingsFields" style="display:none;flex-direction:column;gap:14px;">
      <div class="field-row">
        <div class="field-group"><label>Temperature</label><input type="number" id="s-temperature" step="0.1"></div>
        <div class="field-group"><label>Top P</label><input type="number" id="s-top_p" step="0.1"></div>
        <div class="field-group"><label>Top K</label><input type="number" id="s-top_k" step="1"></div>
      </div>
      <div class="field-row">
        <div class="field-group"><label>Frequency Penalty</label><input type="number" id="s-frequency_penalty" step="0.1"></div>
        <div class="field-group"><label>Presence Penalty</label><input type="number" id="s-presence_penalty" step="0.1"></div>
        <div class="field-group"><label>Repetition Penalty</label><input type="number" id="s-repetition_penalty" step="0.1"></div>
      </div>
      <div class="field-group"><label>Impersonation Prompt</label><textarea id="s-impersonation_prompt"></textarea></div>
      <div class="field-group"><label>Continue Nudge Prompt</label><textarea id="s-continue_nudge_prompt"></textarea></div>
      <div class="field-group"><label>New Chat Prompt</label><textarea id="s-new_chat_prompt"></textarea></div>
      <div class="field-group"><label>Group Nudge Prompt</label><textarea id="s-group_nudge_prompt"></textarea></div>
    </div>
  </div>
</div>`;

function handleMainFileLoad() {
  var file = this.files[0]; if (!file) return;
  gFile = file.name; el('loadedFile').textContent = file.name;
  var reader = new FileReader();
  reader.onload = e => {
    try {
      gData = JSON.parse(e.target.result);
      if (!gData.prompts) gData.prompts = [];
      if (!gData.extensions) gData.extensions = {};
      if (!gData.extensions.regex_scripts) gData.extensions.regex_scripts = [];
      el('exportBtn').disabled = false;
      activateTab('prompts');
    } catch(err) { alert('JSON 解析失败：' + err.message); }
  };
  reader.readAsText(file); this.value = '';
}

function handleImportFileLoad() {
  const file = this.files[0]; if (!file) return;
  if (!gData) { alert('请先加载一个主 JSON 文件！'); this.value = ''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('文件格式不正确，应为数组。');
      const target = gTab === 'prompts' ? gData.prompts : gData.extensions.regex_scripts;
      let count = 0;
      [...imported].reverse().forEach(item => {
        if (typeof item === 'object' && item !== null) {
          // ★ 强制设定导入模块的默认可见状态为：启用
          if (gTab === 'prompts') {
            if (!item.identifier) item.identifier = uuid();
            item.enabled = true; 
          }
          if (gTab === 'regex') {
            if (!item.id) item.id = uuid();
            item.disabled = false;
          }
          target.unshift(item);
          count++;
        }
      });
      if (count > 0) { alert('成功导入 ' + count + ' 个模块！'); buildList(); }
      else alert('没有找到可导入的有效模块。');
    } catch(err) { alert('导入失败：' + err.message); }
  };
  reader.readAsText(file); this.value = '';
}

function exportJSON(selectedOnly) {
  if (!gData) return;
  let data, name;
  if (selectedOnly) {
    if (gSelectedIndices.size === 0) { alert('请先勾选要导出的条目！'); return; }
    const src = gTab === 'prompts' ? gData.prompts : gData.extensions.regex_scripts;
    data = Array.from(gSelectedIndices).sort((a,b)=>a-b).map(i => src[i]);
    name = 'ST_' + gTab + '_Export.json';
  } else {
    data = gData;
    name = gFile.replace(/\.json$/i, '_Modified.json');
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 4)], {type:'application/json'}));
  a.download = name; a.click();
}

function activateTab(tab) {
  exitBatchMode();
  gTab = tab; gIdx = -1;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab === tab));
  el('listWrap').style.display = tab === 'settings' ? 'none' : 'flex';
  document.body.classList.remove('show-editor');
  if (tab === 'settings') { showSettingsEditor(); }
  else { el('listLabel').textContent = tab === 'prompts' ? '预设模块列表' : '正则脚本列表'; buildList(); showHint(); }
}

function showHint() {
  document.body.classList.remove('show-editor');
  el('editBox').style.display = 'none';
  el('hint').style.display = 'block';
}

function showSettingsEditor() {
  document.body.classList.add('show-editor');
  el('hint').style.display = 'none';
  el('editBox').style.display = 'flex';
  el('promptFields').style.display = 'none';
  el('regexFields').style.display = 'none';
  el('settingsFields').style.display = 'flex';
  el('editTitle').textContent = '基础生成参数';
  el('delBtn').style.display = 'none';
  if (!gData) return;
  ['temperature','top_p','top_k','frequency_penalty','presence_penalty','repetition_penalty'].forEach(k => { if(el('s-'+k)) el('s-'+k).value = gData[k] != null ? gData[k] : ''; });
  ['impersonation_prompt','continue_nudge_prompt','new_chat_prompt','group_nudge_prompt'].forEach(k => { if(el('s-'+k)) el('s-'+k).value = gData[k] || ''; });
}

// 渲染列表
function buildList() {
  const box = el('list'); box.innerHTML = ''; if (!gData) return;
  const arr = gTab === 'prompts' ? gData.prompts : gData.extensions.regex_scripts;
  arr.forEach((itemData, idx) => {
    // 判断当前状态：Prompts true为启用，Regex false为启用
    const isOn = gTab === 'prompts' ? !!itemData.enabled : !itemData.disabled;
    
    const div = document.createElement('div');
    div.className = 'item' + (idx === gIdx ? ' on' : '');
    if (!isOn) div.classList.add('is-disabled'); // 如果未启用，添加禁用样式
    div.draggable = !gBatchMode;

    // 多选框
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'item-checkbox'; cb.checked = gSelectedIndices.has(idx);
    cb.onclick = e => e.stopPropagation();
    cb.onchange = () => { gSelectedIndices.has(idx) ? gSelectedIndices.delete(idx) : gSelectedIndices.add(idx); };
    div.appendChild(cb);

    // 名字
    const nm = (gTab === 'prompts' ? itemData.name : itemData.scriptName) || '(未命名)';
    const nameSpan = document.createElement('span'); 
    nameSpan.className = 'item-name'; nameSpan.title = nm; nameSpan.textContent = nm;
    div.appendChild(nameSpan);

    // ★ 隐藏/启用切换按钮（眼睛图标）
    const visBtn = document.createElement('div');
    visBtn.className = 'vis-btn ' + (isOn ? 'vis-on' : 'vis-off');
    visBtn.textContent = '👁️';
    visBtn.title = isOn ? '已启用（点击禁用）' : '已禁用（点击启用）';
    visBtn.onclick = (e) => {
      e.stopPropagation(); // 阻止点击事件冒泡（不触发选中模块）
      // 切换状态并更新数据
      if (gTab === 'prompts') {
        itemData.enabled = !itemData.enabled;
      } else {
        itemData.disabled = !itemData.disabled;
      }
      buildList(); // 重新渲染列表
      // 如果改变的正是当前正在编辑的模块，连带更新右侧编辑区的下拉框
      if (gIdx === idx) selectItem(gIdx); 
    };
    div.appendChild(visBtn);

    // 点击整个条目（选中逻辑）
    div.onclick = () => {
      if (gBatchMode) { cb.checked = !cb.checked; cb.dispatchEvent(new Event('change')); }
      else selectItem(idx);
    };

    // 拖拽逻辑
    div.addEventListener('dragstart', e => { if(gBatchMode) return e.preventDefault(); gDraggedIdx=idx; div.classList.add('dragging'); });
    div.addEventListener('dragend', () => div.classList.remove('dragging'));
    div.addEventListener('dragover', e => { e.preventDefault(); div.classList.add('drag-over'); });
    div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
    div.addEventListener('drop', e => {
      e.preventDefault(); div.classList.remove('drag-over');
      if (gDraggedIdx === null || gDraggedIdx === idx) return;
      const a = gTab === 'prompts' ? gData.prompts : gData.extensions.regex_scripts;
      a.splice(idx, 0, a.splice(gDraggedIdx, 1)[0]);
      gIdx = idx; gDraggedIdx = null; buildList();
    });
    box.appendChild(div);
  });
}

function selectItem(idx) {
  gIdx = idx; document.body.classList.add('show-editor');
  // 必须重新获取一遍数据，防止渲染时取错
  const arr = gTab === 'prompts' ? gData.prompts : gData.extensions.regex_scripts;
  // 增加安全判定
  if (!arr || idx < 0 || idx >= arr.length) return; 
  const item = arr[idx];
  
  el('hint').style.display = 'none'; el('editBox').style.display = 'flex';
  el('promptFields').style.display = gTab === 'prompts' ? 'flex' : 'none';
  el('regexFields').style.display = gTab === 'regex' ? 'flex' : 'none';
  el('settingsFields').style.display = 'none';
  el('delBtn').style.display = 'inline-block';
  el('editTitle').textContent = '正在编辑：' + ((gTab==='prompts'?item.name:item.scriptName)||'(未命名)');
  
  // 绑定编辑区的值
  if (gTab === 'prompts') {
    el('f-name').value = item.name||''; 
    el('f-enabled').value = item.enabled ? 'true':'false'; // 更新右侧是否启用下拉框
    el('f-role').value = item.role||'system'; el('f-depth').value = item.injection_depth??4;
    el('f-pos').value = item.injection_position??0; el('f-content').value = item.content||'';
  } else {
    el('r-name').value = item.scriptName||''; 
    el('r-enabled').value = item.disabled ? 'true':'false'; // 更新右侧是否启用下拉框
    el('r-find').value = item.findRegex||''; el('r-replace').value = item.replaceString||'';
    el('r-placement').value = (item.placement||[]).join(', ');
    el('r-minDepth').value = item.minDepth!=null?item.minDepth:'';
    el('r-maxDepth').value = item.maxDepth!=null?item.maxDepth:'';
    el('r-promptOnly').value = item.promptOnly?'true':'false';
    el('r-markdownOnly').value = item.markdownOnly?'true':'false';
    el('r-runOnEdit').value = item.runOnEdit!==false?'true':'false';
  }
}

function toggleBatchMode() { gBatchMode=!gBatchMode; el('listWrap').classList.toggle('batch-mode',gBatchMode); if(!gBatchMode)gSelectedIndices.clear(); buildList(); }
function exitBatchMode() { if(!gBatchMode)return; gBatchMode=false; el('listWrap').classList.remove('batch-mode'); gSelectedIndices.clear(); buildList(); }
function selectAllInList() {
  const arr = gTab==='prompts'?gData.prompts:gData.extensions.regex_scripts;
  if (gSelectedIndices.size===arr.length) gSelectedIndices.clear();
  else arr.forEach((_,i)=>gSelectedIndices.add(i));
  buildList();
}

function addItem() {
  if (!gData) { alert('请先加载 JSON！'); return; }
  const arr = gTab==='prompts'?gData.prompts:gData.extensions.regex_scripts;
  // ★ 强制设定新增模块的默认可见状态为：启用 (enabled: true / disabled: false)
  if (gTab==='prompts') arr.unshift({identifier:uuid(),name:'新建模块 '+(arr.length+1),enabled:true,role:'system',content:''});
  else arr.unshift({id:uuid(),scriptName:'新建正则 '+(arr.length+1),disabled:false,findRegex:'',replaceString:''});
  gIdx=0; buildList(); selectItem(0);
}

function deleteItem() {
  if (gIdx<0||!confirm('确定删除此项？')) return;
  (gTab==='prompts'?gData.prompts:gData.extensions.regex_scripts).splice(gIdx,1);
  gIdx=-1; buildList(); showHint();
}

window.onload = function() {
  el('fileInput').addEventListener('change', handleMainFileLoad);
  el('importInput').addEventListener('change', handleImportFileLoad);
  document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', function() {
    if (!gData && this.dataset.tab !== 'settings') { alert('请先加载 JSON 文件！'); return; }
    activateTab(this.dataset.tab);
  }));
  el('exportBtn').onclick = () => exportJSON(false);
  el('exportSelectedBtn').onclick = () => exportJSON(true);
  el('addBtn').onclick = addItem;
  el('delBtn').onclick = deleteItem;
  el('backBtn').onclick = () => document.body.classList.remove('show-editor');
  el('batchBtn').onclick = toggleBatchMode;
  el('doneBatchBtn').onclick = exitBatchMode;
  el('selectAllBtn').onclick = selectAllInList;

  function bind(id, evt, cb) { const e=el(id); if(e) e.addEventListener(evt, ()=>cb(e.value)); }
  function set(key, val) { if(gIdx<0||!gData)return; (gTab==='prompts'?gData.prompts:gData.extensions.regex_scripts)[gIdx][key]=val; }
  function refreshTitle(name) { el('editTitle').textContent='正在编辑：'+(name||'(未命名)'); buildList(); }

  bind('f-name','input',v=>{set('name',v);refreshTitle(v);});
  bind('f-enabled','change',v=>{set('enabled',v==='true');buildList();}); // 编辑区改变也会刷新列表眼睛状态
  bind('f-role','change',v=>set('role',v));
  bind('f-depth','input',v=>set('injection_depth',parseInt(v)||0));
  bind('f-pos','input',v=>set('injection_position',parseInt(v)||0));
  bind('f-content','input',v=>set('content',v));

  bind('r-name','input',v=>{set('scriptName',v);refreshTitle(v);});
  bind('r-enabled','change',v=>{set('disabled',v==='true');buildList();}); // 编辑区改变也会刷新列表眼睛状态
  bind('r-find','input',v=>set('findRegex',v));
  bind('r-replace','input',v=>set('replaceString',v));
  bind('r-promptOnly','change',v=>set('promptOnly',v==='true'));
  bind('r-markdownOnly','change',v=>set('markdownOnly',v==='true'));
  bind('r-runOnEdit','change',v=>set('runOnEdit',v==='true'));
  bind('r-placement','input',v=>set('placement',v.split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n))));
  bind('r-minDepth','input',v=>set('minDepth',v===''?null:parseInt(v)));
  bind('r-maxDepth','input',v=>set('maxDepth',v===''?null:parseInt(v)));

  ['temperature','top_p','top_k','frequency_penalty','presence_penalty','repetition_penalty']
    .forEach(k=>bind('s-'+k,'input',v=>{if(gData)gData[k]=parseFloat(v);}));
  ['impersonation_prompt','continue_nudge_prompt','new_chat_prompt','group_nudge_prompt']
    .forEach(k=>bind('s-'+k,'input',v=>{if(gData)gData[k]=v;}));
};

function uuid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    var r = Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16);
  });
}
</script>
</body>
</html>
